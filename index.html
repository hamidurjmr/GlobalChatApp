<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>WhatsApp · fixed messaging + working send</title>
  <!-- Firebase modular SDK v10 -->
  <script type="importmap">
    {
      "imports": {
        "@firebase/app": "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js",
        "@firebase/auth": "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js",
        "@firebase/firestore": "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js",
        "@firebase/storage": "https://www.gstatic.com/firebasejs/10.12.0/firebase-storage.js"
      }
    }
  </script>
  <!-- Font Awesome 6 -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    }

    body {
      background: #0b141a;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
    }

    #app {
      width: 100%;
      max-width: 1400px;
      height: 100vh;
      max-height: 900px;
      background: #111b21;
      display: flex;
      flex-direction: column;
      box-shadow: 0 20px 40px rgba(0,0,0,0.5);
      position: relative;
    }

    /* Login overlay */
    #login-overlay {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(11, 20, 26, 0.98);
      backdrop-filter: blur(10px);
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 3000;
    }
    .login-card {
      background: #1f2c33;
      padding: 2.5rem 2rem;
      border-radius: 32px;
      text-align: center;
      color: white;
      width: 90%;
      max-width: 380px;
    }
    .login-card i.fa-whatsapp {
      font-size: 4rem;
      color: #25d366;
      margin-bottom: 1rem;
    }
    .google-btn {
      background: #1f2c33;
      border: 1px solid #3c4a54;
      color: white;
      padding: 14px 24px;
      border-radius: 40px;
      font-size: 1.1rem;
      width: 100%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
    }

    /* Profile overlay */
    #profile-overlay {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(11, 20, 26, 0.98);
      backdrop-filter: blur(10px);
      display: none;
      justify-content: center;
      align-items: center;
      z-index: 2500;
    }
    .profile-card {
      background: #1f2c33;
      padding: 2rem;
      border-radius: 32px;
      color: white;
      width: 90%;
      max-width: 400px;
    }
    .profile-field {
      margin-bottom: 1.5rem;
    }
    .profile-field label {
      display: block;
      margin-bottom: 8px;
      color: #8696a0;
    }
    .profile-field input, .profile-field textarea {
      width: 100%;
      background: #2a3942;
      border: none;
      border-radius: 16px;
      padding: 14px 18px;
      color: white;
    }
    .profile-pic-preview {
      display: flex;
      align-items: center;
      gap: 20px;
      margin: 20px 0;
      background: #2a3942;
      border-radius: 50px;
      padding: 10px;
    }
    .profile-pic-preview img {
      width: 70px;
      height: 70px;
      border-radius: 50%;
      object-fit: cover;
      border: 3px solid #25d366;
    }
    .save-profile-btn {
      background: #25d366;
      border: none;
      color: #111b21;
      font-weight: bold;
      padding: 16px;
      width: 100%;
      border-radius: 40px;
      cursor: pointer;
    }

    /* Main chat view */
    #chat-view {
      display: flex;
      height: 100%;
      width: 100%;
      background: #1f2c33;
      opacity: 0;
      transition: opacity 0.5s ease;
    }

    /* Sidebar */
    .sidebar {
      width: 35%;
      max-width: 400px;
      background: #111b21;
      border-right: 1px solid #2a3942;
      display: flex;
      flex-direction: column;
    }

    @media (max-width: 768px) {
      .sidebar {
        position: absolute;
        width: 80%;
        max-width: 300px;
        height: 100%;
        z-index: 100;
        transform: translateX(-100%);
        transition: transform 0.3s ease;
      }
      .sidebar.mobile-open {
        transform: translateX(0);
      }
      .chat-panel {
        width: 100%;
      }
    }

    .profile-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px;
      background: #1f2c33;
    }
    .user-profile {
      display: flex;
      align-items: center;
      gap: 12px;
      cursor: pointer;
    }
    .avatar {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      object-fit: cover;
      border: 2px solid #25d366;
    }
    .status-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #25d366;
      display: inline-block;
      margin-left: 4px;
    }

    .menu-toggle {
      display: none;
      background: none;
      border: none;
      color: #8696a0;
      font-size: 1.5rem;
      cursor: pointer;
      padding: 10px;
      position: absolute;
      z-index: 101;
    }
    @media (max-width: 768px) {
      .menu-toggle {
        display: block;
      }
    }

    .tabs {
      display: flex;
      background: #1f2c33;
      border-bottom: 1px solid #2a3942;
    }
    .tab {
      flex: 1;
      text-align: center;
      padding: 14px 4px;
      color: #8696a0;
      cursor: pointer;
      border-bottom: 3px solid transparent;
    }
    .tab.active {
      color: #25d366;
      border-bottom: 3px solid #25d366;
    }

    .tab-pane {
      flex: 1;
      overflow-y: auto;
      display: none;
    }
    .tab-pane.active-pane {
      display: block;
    }

    .user-list {
      padding: 8px 0;
    }
    .user-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 16px;
      cursor: pointer;
      border-bottom: 1px solid #1f2c33;
    }
    .user-item:hover, .user-item.selected {
      background: #2a3942;
    }
    .avatar-small {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      object-fit: cover;
    }

    .add-by-id {
      padding: 20px 16px;
    }
    .add-by-id input {
      width: 100%;
      background: #2a3942;
      border: none;
      border-radius: 26px;
      padding: 14px 18px;
      color: white;
      margin-bottom: 12px;
    }
    .add-by-id button {
      width: 100%;
      background: #25d366;
      border: none;
      border-radius: 26px;
      padding: 14px;
      color: #111b21;
      font-weight: bold;
      cursor: pointer;
    }

    /* Chat panel */
    .chat-panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      background: #0b141a;
    }
    .chat-header {
      padding: 16px 20px;
      background: #1f2c33;
      display: flex;
      align-items: center;
      gap: 16px;
      color: white;
    }
    .avatar-medium {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      object-fit: cover;
    }
    .typing-indicator {
      font-size: 0.85rem;
      color: #00a884;
      font-style: italic;
    }

    .messages-area {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      background: #0b141a;
    }

    .message-row {
      display: flex;
      margin-bottom: 4px;
    }
    .message-row.me {
      justify-content: flex-end;
    }
    .message-bubble {
      max-width: 70%;
      padding: 12px 16px;
      border-radius: 22px;
      background: #1f2c33;
      color: white;
    }
    .message-row.me .message-bubble {
      background: #005c4b;
    }
    .message-meta {
      font-size: 0.7rem;
      color: #8696a0;
      margin-top: 4px;
      text-align: right;
    }

    .message-composer {
      background: #1f2c33;
      padding: 16px 20px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .composer-input {
      flex: 1;
      background: #2a3942;
      border: none;
      border-radius: 30px;
      padding: 14px 20px;
      color: white;
      font-size: 1rem;
      outline: none;
    }
    .send-btn, .attach-btn {
      background: none;
      border: none;
      color: #8696a0;
      font-size: 1.8rem;
      cursor: pointer;
    }
    .send-btn {
      color: #00a884;
    }
  </style>
</head>
<body>
<div id="app">
  <!-- Login Overlay -->
  <div id="login-overlay">
    <div class="login-card">
      <i class="fab fa-whatsapp"></i>
      <h2>WhatsApp · Messenger</h2>
      <button class="google-btn" id="googleLoginBtn">
        <i class="fab fa-google"></i> Sign in with Google
      </button>
    </div>
  </div>

  <!-- Profile Completion Overlay -->
  <div id="profile-overlay">
    <div class="profile-card">
      <h3>Complete Your Profile</h3>
      <div class="profile-field">
        <label>Display Name *</label>
        <input type="text" id="profileName" placeholder="Enter your name">
      </div>
      <div class="profile-field">
        <label>Date of Birth</label>
        <input type="date" id="profileDob">
      </div>
      <div class="profile-field">
        <label>Bio</label>
        <textarea id="profileBio" placeholder="Tell something about yourself..." rows="3"></textarea>
      </div>
      <div class="profile-pic-preview">
        <img id="profilePicPreview" src="https://via.placeholder.com/70" alt="preview">
        <button id="changeProfilePicBtn">Change Photo</button>
        <input type="file" id="profilePicUpload" accept="image/*" style="display: none;">
      </div>
      <button class="save-profile-btn" id="saveProfileBtn">Save & Continue</button>
    </div>
  </div>

  <!-- Main Chat View -->
  <div id="chat-view">
    <button class="menu-toggle" id="menuToggle"><i class="fas fa-bars"></i></button>

    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
      <div class="profile-header">
        <div class="user-profile" id="myProfileBtn">
          <img class="avatar" id="myAvatar" src="https://via.placeholder.com/44" alt="avatar">
          <span id="myName">Loading...</span>
          <span class="status-dot"></span>
        </div>
        <button class="logout-btn" id="logoutBtn"><i class="fas fa-sign-out-alt"></i></button>
      </div>

      <div class="tabs">
        <div class="tab active" data-tab="chats">Chats</div>
        <div class="tab" data-tab="explore">Explore</div>
        <div class="tab" data-tab="add">Add by ID</div>
      </div>

      <!-- Chats Tab -->
      <div class="tab-pane active-pane" id="pane-chats">
        <div class="user-list" id="chatUsersList"></div>
      </div>

      <!-- Explore Tab -->
      <div class="tab-pane" id="pane-explore">
        <div class="user-list" id="exploreUsersList"></div>
      </div>

      <!-- Add by ID Tab -->
      <div class="tab-pane" id="pane-add">
        <div class="add-by-id">
          <input type="text" id="targetUserId" placeholder="Enter email or UID">
          <button id="startChatByIdBtn">Start Chat</button>
        </div>
      </div>
    </aside>

    <!-- Chat Panel -->
    <main class="chat-panel">
      <div class="chat-header">
        <img class="avatar-medium" id="chatPartnerAvatar" src="https://via.placeholder.com/48" alt="">
        <div>
          <h3 id="chatPartnerName">Select a user</h3>
          <div id="typingIndicator" class="typing-indicator"></div>
        </div>
      </div>

      <div class="messages-area" id="messagesArea"></div>

      <div class="message-composer">
        <label class="attach-btn">
          <i class="fas fa-paperclip"></i>
          <input type="file" id="imageUpload" accept="image/*" style="display: none;">
        </label>
        <input type="text" class="composer-input" id="messageInput" placeholder="Type a message">
        <button class="send-btn" id="sendMessageBtn"><i class="fas fa-paper-plane"></i></button>
      </div>
    </main>
  </div>
</div>

<script type="module">
  // Import Firebase modules
  import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
  import { getAuth, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';
  import { getFirestore, doc, setDoc, getDoc, collection, query, where, onSnapshot, addDoc, serverTimestamp, updateDoc, orderBy, limit, getDocs } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';
  import { getStorage, ref, uploadBytes, getDownloadURL } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-storage.js';

  // Firebase config
  const firebaseConfig = {
    apiKey: "AIzaSyCCloNQDHI8-fm7Z-5aDUZxH7DfPp-q8-0",
    authDomain: "globalchatapp-d5b72.firebaseapp.com",
    projectId: "globalchatapp-d5b72",
    storageBucket: "globalchatapp-d5b72.firebasestorage.app",
    messagingSenderId: "14224642973",
    appId: "1:14224642973:web:6aafc3f1082c4dd8af1574"
  };

  // Initialize Firebase
  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);
  const storage = getStorage(app);
  const provider = new GoogleAuthProvider();

  // DOM Elements
  const loginOverlay = document.getElementById('login-overlay');
  const profileOverlay = document.getElementById('profile-overlay');
  const chatView = document.getElementById('chat-view');
  const googleLoginBtn = document.getElementById('googleLoginBtn');
  const logoutBtn = document.getElementById('logoutBtn');
  const myAvatar = document.getElementById('myAvatar');
  const myName = document.getElementById('myName');
  const messagesArea = document.getElementById('messagesArea');
  const messageInput = document.getElementById('messageInput');
  const sendBtn = document.getElementById('sendMessageBtn');
  const imageUpload = document.getElementById('imageUpload');
  const chatPartnerName = document.getElementById('chatPartnerName');
  const chatPartnerAvatar = document.getElementById('chatPartnerAvatar');
  const typingIndicator = document.getElementById('typingIndicator');
  const menuToggle = document.getElementById('menuToggle');
  const sidebar = document.getElementById('sidebar');

  // Profile elements
  const profileName = document.getElementById('profileName');
  const profileDob = document.getElementById('profileDob');
  const profileBio = document.getElementById('profileBio');
  const profilePicPreview = document.getElementById('profilePicPreview');
  const changeProfilePicBtn = document.getElementById('changeProfilePicBtn');
  const profilePicUpload = document.getElementById('profilePicUpload');
  const saveProfileBtn = document.getElementById('saveProfileBtn');
  const myProfileBtn = document.getElementById('myProfileBtn');

  // Tabs
  const tabs = document.querySelectorAll('.tab');
  const chatUsersList = document.getElementById('chatUsersList');
  const exploreUsersList = document.getElementById('exploreUsersList');
  const targetUserIdInput = document.getElementById('targetUserId');
  const startChatByIdBtn = document.getElementById('startChatByIdBtn');

  // State
  let currentUser = null;
  let currentUserDoc = null;
  let selectedUserId = null;
  let users = {};
  let myChats = new Set();
  let unsubscribeMessages = null;
  let unsubscribeTyping = null;
  let typingTimeout = null;
  let newProfilePicFile = null;

  // Mobile menu
  menuToggle.addEventListener('click', () => {
    sidebar.classList.toggle('mobile-open');
  });

  // Helper functions
  async function setOnlineStatus(uid, status) {
    if (!uid) return;
    try {
      await updateDoc(doc(db, 'users', uid), { online: status });
    } catch (e) {
      console.log('Online status error:', e);
    }
  }

  async function loadMyProfile(uid) {
    const snap = await getDoc(doc(db, 'users', uid));
    if (snap.exists()) {
      currentUserDoc = snap.data();
      myAvatar.src = currentUserDoc.photoURL || 'https://via.placeholder.com/44';
      myName.innerText = currentUserDoc.name || 'Me';
    }
  }

  async function checkProfileCompletion(user) {
    const userRef = doc(db, 'users', user.uid);
    const snap = await getDoc(userRef);
    
    if (!snap.exists()) {
      const minimal = {
        uid: user.uid,
        email: user.email,
        name: user.displayName || '',
        photoURL: user.photoURL || 'https://via.placeholder.com/100',
        dob: '',
        bio: '',
        online: true,
        createdAt: serverTimestamp()
      };
      await setDoc(userRef, minimal);
      currentUserDoc = minimal;
      profileName.value = minimal.name;
      profilePicPreview.src = minimal.photoURL;
      profileOverlay.style.display = 'flex';
    } else {
      const data = snap.data();
      currentUserDoc = data;
      
      if (!data.bio || !data.name || !data.dob) {
        profileName.value = data.name || '';
        profileDob.value = data.dob || '';
        profileBio.value = data.bio || '';
        profilePicPreview.src = data.photoURL || 'https://via.placeholder.com/100';
        profileOverlay.style.display = 'flex';
      } else {
        profileOverlay.style.display = 'none';
      }
    }
    
    myAvatar.src = currentUserDoc?.photoURL || 'https://via.placeholder.com/44';
    myName.innerText = currentUserDoc?.name || 'Me';
  }

  async function saveProfile() {
    if (!currentUser) return;
    
    const name = profileName.value.trim();
    if (!name) {
      alert('Please enter your name');
      return;
    }

    try {
      let photoURL = currentUserDoc?.photoURL || 'https://via.placeholder.com/100';
      
      if (newProfilePicFile) {
        const filePath = `profile_pics/${currentUser.uid}_${Date.now()}`;
        const storageRef = ref(storage, filePath);
        await uploadBytes(storageRef, newProfilePicFile);
        photoURL = await getDownloadURL(storageRef);
      }

      const updates = {
        name: name,
        dob: profileDob.value || '',
        bio: profileBio.value || '',
        photoURL: photoURL,
        updatedAt: serverTimestamp()
      };
      
      await updateDoc(doc(db, 'users', currentUser.uid), updates);
      
      currentUserDoc = { ...currentUserDoc, ...updates };
      myAvatar.src = photoURL;
      myName.innerText = name;
      
      profileOverlay.style.display = 'none';
      newProfilePicFile = null;
    } catch (error) {
      console.error('Save error:', error);
      alert('Error saving profile');
    }
  }

  // Subscribe to all users
  function subscribeAllUsers() {
    const q = query(collection(db, 'users'));
    return onSnapshot(q, (snapshot) => {
      snapshot.docChanges().forEach(change => {
        const data = change.doc.data();
        users[data.uid] = data;
      });
      snapshot.docs.forEach(d => { users[d.id] = d.data(); });
      renderExploreList();
      renderChatsList();
      if (selectedUserId && users[selectedUserId]) {
        updateChatHeader(selectedUserId);
      }
    });
  }

  function updateChatHeader(uid) {
    const u = users[uid];
    if (u) {
      chatPartnerName.innerText = u.name || 'User';
      chatPartnerAvatar.src = u.photoURL || 'https://via.placeholder.com/48';
    }
  }

  // Subscribe to messages
  function subscribeToMessages() {
    if (!currentUser) return;
    
    const q = query(
      collection(db, 'messages'),
      where('participants', 'array-contains', currentUser.uid),
      orderBy('timestamp', 'asc')
    );
    
    return onSnapshot(q, (snapshot) => {
      // Update myChats
      snapshot.docChanges().forEach(change => {
        const data = change.doc.data();
        if (data.participants) {
          const other = data.participants.find(p => p !== currentUser.uid);
          if (other) myChats.add(other);
        }
      });
      
      snapshot.docs.forEach(doc => {
        const data = doc.data();
        if (data.participants) {
          const other = data.participants.find(p => p !== currentUser.uid);
          if (other) myChats.add(other);
        }
      });
      
      renderChatsList();
      
      // Render messages for selected user
      if (selectedUserId) {
        const relevantMessages = [];
        snapshot.docs.forEach(doc => {
          const data = doc.data();
          if ((data.sender === currentUser.uid && data.receiver === selectedUserId) ||
              (data.sender === selectedUserId && data.receiver === currentUser.uid)) {
            relevantMessages.push({ id: doc.id, ...data });
          }
        });
        renderMessages(relevantMessages);
      }
    });
  }

  function renderExploreList() {
    if (!currentUser) return;
    const others = Object.values(users).filter(u => u.uid !== currentUser.uid);
    let html = '';
    others.forEach(u => {
      html += `
        <div class="user-item explore-item" data-uid="${u.uid}">
          <img class="avatar-small" src="${u.photoURL || 'https://via.placeholder.com/42'}" alt="avatar">
          <div>
            <div style="color:white">${u.name || 'No name'} ${u.online ? '🟢' : ''}</div>
            <div style="font-size:0.8rem; color:#8696a0;">${u.email || ''}</div>
          </div>
        </div>
      `;
    });
    exploreUsersList.innerHTML = html || '<div style="color:#8696a0; padding:20px;">No users</div>';
    
    document.querySelectorAll('.explore-item').forEach(el => {
      el.addEventListener('click', () => {
        selectUser(el.dataset.uid);
        if (window.innerWidth <= 768) sidebar.classList.remove('mobile-open');
      });
    });
  }

  function renderChatsList() {
    if (!currentUser) return;
    const chatUids = Array.from(myChats);
    const chatUsers = chatUids.map(uid => users[uid]).filter(u => u && u.uid !== currentUser.uid);
    let html = '';
    chatUsers.forEach(u => {
      html += `
        <div class="user-item chat-item" data-uid="${u.uid}">
          <img class="avatar-small" src="${u.photoURL || 'https://via.placeholder.com/42'}" alt="avatar">
          <div>
            <div style="color:white">${u.name || 'No name'} ${u.online ? '🟢' : ''}</div>
            <div style="font-size:0.8rem; color:#8696a0;">${u.email || ''}</div>
          </div>
        </div>
      `;
    });
    chatUsersList.innerHTML = html || '<div style="color:#8696a0; padding:20px;">No chats</div>';
    
    document.querySelectorAll('.chat-item').forEach(el => {
      el.addEventListener('click', () => {
        selectUser(el.dataset.uid);
        if (window.innerWidth <= 768) sidebar.classList.remove('mobile-open');
      });
    });
  }

  async function selectUser(uid) {
    if (!currentUser || !uid || uid === selectedUserId) return;
    
    // Update UI
    document.querySelectorAll('.user-item').forEach(el => el.classList.remove('selected'));
    const selectedEl = document.querySelector(`.user-item[data-uid="${uid}"]`);
    if (selectedEl) selectedEl.classList.add('selected');
    
    selectedUserId = uid;
    updateChatHeader(uid);

    // Typing indicator
    if (unsubscribeTyping) unsubscribeTyping();
    const typingDocRef = doc(db, 'typing', `${currentUser.uid}_${uid}`);
    unsubscribeTyping = onSnapshot(typingDocRef, (snap) => {
      typingIndicator.innerText = snap.exists() && snap.data().isTyping ? 'typing...' : '';
    });
  }

  function renderMessages(messages) {
    let html = '';
    messages.forEach(msg => {
      const isMe = msg.sender === currentUser.uid;
      const time = msg.timestamp?.toDate().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }) || '';
      
      if (msg.type === 'image') {
        html += `
          <div class="message-row ${isMe ? 'me' : 'other'}">
            <div class="message-bubble">
              <img src="${msg.imageUrl}" style="max-width:200px; border-radius:12px;" onclick="window.open(this.src)">
              <div class="message-meta">${time}</div>
            </div>
          </div>
        `;
      } else {
        html += `
          <div class="message-row ${isMe ? 'me' : 'other'}">
            <div class="message-bubble">
              ${msg.text || ''}
              <div class="message-meta">${time}</div>
            </div>
          </div>
        `;
      }
    });
    messagesArea.innerHTML = html;
    messagesArea.scrollTop = messagesArea.scrollHeight;
  }

  // FIXED: Send message function with proper error handling
  async function sendTextMessage() {
    console.log('Send button clicked'); // Debug log
    
    const text = messageInput.value.trim();
    if (!text) {
      console.log('No text to send');
      return;
    }
    
    if (!selectedUserId) {
      alert('Please select a user first');
      return;
    }
    
    if (!currentUser) {
      alert('You are not logged in');
      return;
    }

    console.log('Sending message to:', selectedUserId);
    const messageText = text;
    messageInput.value = ''; // Clear input immediately
    
    try {
      const messageData = {
        sender: currentUser.uid,
        receiver: selectedUserId,
        participants: [currentUser.uid, selectedUserId],
        text: messageText,
        type: 'text',
        timestamp: serverTimestamp()
      };
      
      console.log('Message data:', messageData);
      
      // Add to Firestore
      const docRef = await addDoc(collection(db, 'messages'), messageData);
      console.log('Message sent with ID:', docRef.id);
      
      // Add to myChats
      myChats.add(selectedUserId);
      
    } catch (error) {
      console.error('Send error:', error);
      alert('Failed to send: ' + error.message);
    }
  }

  async function sendImageMessage(file) {
    if (!file || !selectedUserId || !currentUser) return;
    
    try {
      const path = `chat_images/${currentUser.uid}_${Date.now()}_${file.name}`;
      const storageRef = ref(storage, path);
      await uploadBytes(storageRef, file);
      const url = await getDownloadURL(storageRef);
      
      await addDoc(collection(db, 'messages'), {
        sender: currentUser.uid,
        receiver: selectedUserId,
        participants: [currentUser.uid, selectedUserId],
        imageUrl: url,
        type: 'image',
        timestamp: serverTimestamp()
      });
      
      myChats.add(selectedUserId);
      
    } catch (error) {
      console.error('Image send error:', error);
      alert('Failed to send image');
    }
  }

  async function setTyping(typing) {
    if (!currentUser || !selectedUserId) return;
    const typingRef = doc(db, 'typing', `${currentUser.uid}_${selectedUserId}`);
    await setDoc(typingRef, { isTyping: typing }, { merge: true });
    
    if (typing) {
      clearTimeout(typingTimeout);
      typingTimeout = setTimeout(() => setTyping(false), 2500);
    }
  }

  async function startChatById() {
    const id = targetUserIdInput.value.trim();
    if (!id) return;
    
    let target = users[id];
    if (!target) {
      const q = query(collection(db, 'users'), where('email', '==', id), limit(1));
      const snap = await getDocs(q);
      if (!snap.empty) target = snap.docs[0].data();
    }
    
    if (target && target.uid !== currentUser.uid) {
      selectUser(target.uid);
      targetUserIdInput.value = '';
      if (window.innerWidth <= 768) sidebar.classList.remove('mobile-open');
    } else {
      alert('User not found');
    }
  }

  // Auth observer
  onAuthStateChanged(auth, async (user) => {
    console.log('Auth state changed:', user ? 'logged in' : 'logged out');
    
    if (user) {
      currentUser = user;
      await checkProfileCompletion(user);
      await loadMyProfile(user.uid);
      loginOverlay.style.display = 'none';
      chatView.style.opacity = '1';

      subscribeAllUsers();
      unsubscribeMessages = subscribeToMessages();

      window.addEventListener('beforeunload', () => setOnlineStatus(user.uid, false));
      setOnlineStatus(user.uid, true);
    } else {
      if (currentUser) setOnlineStatus(currentUser.uid, false);
      currentUser = null;
      loginOverlay.style.display = 'flex';
      profileOverlay.style.display = 'none';
      chatView.style.opacity = '0';
      if (unsubscribeMessages) unsubscribeMessages();
      if (unsubscribeTyping) unsubscribeTyping();
    }
  });

  // Event Listeners
  googleLoginBtn.addEventListener('click', () => {
    signInWithPopup(auth, provider).catch(e => alert(e.message));
  });
  
  logoutBtn.addEventListener('click', () => signOut(auth));

  // FIXED: Direct event binding for send button
  sendBtn.onclick = sendTextMessage;
  
  messageInput.addEventListener('keypress', e => { 
    if (e.key === 'Enter') {
      e.preventDefault();
      sendTextMessage();
    }
  });
  
  messageInput.addEventListener('input', () => setTyping(true));

  imageUpload.addEventListener('change', e => {
    if (e.target.files[0]) sendImageMessage(e.target.files[0]);
    imageUpload.value = '';
  });

  changeProfilePicBtn.addEventListener('click', () => profilePicUpload.click());
  
  profilePicUpload.addEventListener('change', e => {
    const file = e.target.files[0];
    if (file) {
      newProfilePicFile = file;
      const reader = new FileReader();
      reader.onload = (e) => { profilePicPreview.src = e.target.result; };
      reader.readAsDataURL(file);
    }
  });

  saveProfileBtn.addEventListener('click', saveProfile);

  myProfileBtn.addEventListener('click', async () => {
    if (currentUserDoc) {
      profileName.value = currentUserDoc.name || '';
      profileDob.value = currentUserDoc.dob || '';
      profileBio.value = currentUserDoc.bio || '';
      profilePicPreview.src = currentUserDoc.photoURL || 'https://via.placeholder.com/100';
      profileOverlay.style.display = 'flex';
    }
  });

  // Tabs
  tabs.forEach(t => {
    t.addEventListener('click', () => {
      tabs.forEach(tab => tab.classList.remove('active'));
      t.classList.add('active');
      document.querySelectorAll('.tab-pane').forEach(p => p.classList.remove('active-pane'));
      document.getElementById(`pane-${t.dataset.tab}`).classList.add('active-pane');
    });
  });

  startChatByIdBtn.addEventListener('click', startChatById);
  targetUserIdInput.addEventListener('keypress', e => { if (e.key === 'Enter') startChatById(); });

</script>
</body>
</html>
