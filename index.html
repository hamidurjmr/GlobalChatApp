<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>WhatsApp · real-time chat</title>
  <!-- Firebase modular SDK v10 (latest stable) -->
  <script type="importmap">
    {
      "imports": {
        "@firebase/app": "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js",
        "@firebase/auth": "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js",
        "@firebase/firestore": "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js",
        "@firebase/storage": "https://www.gstatic.com/firebasejs/10.12.0/firebase-storage.js"
      }
    }
  </script>
  <!-- Font Awesome 6 (free) for icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    }

    body {
      background: #0b141a;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    /* main app container – like a phone frame */
    #app {
      width: 100%;
      max-width: 1400px;
      height: 100vh;
      max-height: 900px;
      background-color: #111b21;
      display: flex;
      flex-direction: column;
      box-shadow: 0 20px 40px rgba(0,0,0,0.5);
    }

    /* login overlay (hidden after auth) */
    #login-overlay {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(11, 20, 26, 0.95);
      backdrop-filter: blur(6px);
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 2000;
    }
    .login-card {
      background: #1f2c33;
      padding: 2.5rem 2rem;
      border-radius: 32px;
      text-align: center;
      color: white;
      width: 90%;
      max-width: 360px;
      box-shadow: 0 15px 30px rgba(0,0,0,0.6);
    }
    .login-card i {
      font-size: 4rem;
      color: #25d366;
      margin-bottom: 1rem;
    }
    .login-card h2 {
      font-weight: 400;
      margin-bottom: 2rem;
    }
    .google-btn {
      background: #1f2c33;
      border: 1px solid #3c4a54;
      color: white;
      padding: 12px 24px;
      border-radius: 40px;
      font-size: 1.1rem;
      width: 100%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      transition: background 0.2s;
    }
    .google-btn:hover {
      background: #2a3942;
    }

    /* main chat layout (hidden until login) */
    #chat-view {
      display: flex;
      height: 100%;
      width: 100%;
      background: #1f2c33;
      opacity: 0;
      transition: opacity 0.2s;
    }

    /* SIDEBAR — left panel */
    .sidebar {
      width: 35%;
      max-width: 400px;
      background: #111b21;
      border-right: 1px solid #2a3942;
      display: flex;
      flex-direction: column;
    }

    /* profile header in sidebar */
    .profile-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px;
      background: #1f2c33;
    }
    .user-profile {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .avatar {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      object-fit: cover;
      background: #2a3942;
    }
    .status-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #25d366;
      display: inline-block;
      margin-left: 4px;
      border: 2px solid #1f2c33;
    }
    .logout-btn {
      background: none;
      border: none;
      color: #8696a0;
      font-size: 1.4rem;
      cursor: pointer;
    }

    /* user list (all registered users) */
    .user-list {
      flex: 1;
      overflow-y: auto;
      padding: 8px 0;
    }
    .user-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 16px;
      cursor: pointer;
      transition: background 0.1s;
      border-bottom: 1px solid #1f2c33;
    }
    .user-item:hover, .user-item.selected {
      background: #2a3942;
    }
    .user-item .avatar-small {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      object-fit: cover;
    }
    .user-info {
      flex: 1;
    }
    .user-name {
      color: white;
      font-weight: 500;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .user-email {
      font-size: 0.8rem;
      color: #8696a0;
    }
    .online-badge {
      font-size: 0.7rem;
      background: #25d366;
      color: #111b21;
      padding: 2px 6px;
      border-radius: 20px;
      font-weight: 600;
    }

    /* right chat panel */
    .chat-panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      background: #0b141a;
    }
    .chat-header {
      padding: 16px 20px;
      background: #1f2c33;
      display: flex;
      align-items: center;
      gap: 16px;
      color: white;
      border-bottom: 1px solid #2a3942;
    }
    .chat-header .avatar-medium {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      object-fit: cover;
    }
    .chat-header-info h3 {
      font-weight: 500;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .typing-indicator {
      font-size: 0.85rem;
      color: #00a884;
      font-style: italic;
    }

    /* messages container */
    .messages-area {
      flex: 1;
      overflow-y: auto;
      padding: 20px 24px;
      display: flex;
      flex-direction: column;
      gap: 6px;
      background: #0b141a;
    }

    /* bubbles */
    .message-row {
      display: flex;
      margin-bottom: 2px;
    }
    .message-row.me {
      justify-content: flex-end;
    }
    .message-bubble {
      max-width: 70%;
      padding: 10px 14px;
      border-radius: 22px;
      background: #1f2c33;
      color: white;
      position: relative;
      word-wrap: break-word;
      line-height: 1.4;
    }
    .message-row.me .message-bubble {
      background: #005c4b;
      border-bottom-right-radius: 6px;
    }
    .message-row.other .message-bubble {
      background: #1f2c33;
      border-bottom-left-radius: 6px;
    }
    .message-meta {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.7rem;
      color: #8696a0;
      margin-top: 4px;
      justify-content: flex-end;
    }
    .message-row.me .message-meta {
      color: #a9d9d0;
    }
    .message-image {
      max-width: 220px;
      border-radius: 12px;
      cursor: pointer;
      margin-bottom: 4px;
    }

    /* typing area */
    .message-composer {
      background: #1f2c33;
      padding: 12px 20px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .composer-input {
      flex: 1;
      background: #2a3942;
      border: none;
      border-radius: 26px;
      padding: 12px 18px;
      color: white;
      font-size: 1rem;
      outline: none;
    }
    .composer-input::placeholder {
      color: #8696a0;
    }
    .attach-btn, .send-btn {
      background: none;
      border: none;
      color: #8696a0;
      font-size: 1.6rem;
      cursor: pointer;
      display: flex;
      align-items: center;
    }
    .send-btn {
      color: #00a884;
    }
    .attach-btn input {
      display: none;
    }

    /* responsive adjustments */
    @media (max-width: 768px) {
      .sidebar {
        width: 100%;
        max-width: 100%;
        display: none;
      }
      .sidebar.mobile-show {
        display: flex;
      }
      .chat-panel {
        width: 100%;
      }
    }

    /* utility */
    .hidden {
      display: none !important;
    }
  </style>
</head>
<body>
<div id="app">
  <!-- LOGIN OVERLAY (visible by default) -->
  <div id="login-overlay">
    <div class="login-card">
      <i class="fab fa-whatsapp"></i>
      <h2>WhatsApp Web</h2>
      <button class="google-btn" id="googleLoginBtn">
        <i class="fab fa-google"></i> Sign in with Google
      </button>
    </div>
  </div>

  <!-- MAIN CHAT VIEW (hidden until authenticated) -->
  <div id="chat-view">
    <!-- LEFT SIDEBAR -->
    <aside class="sidebar" id="sidebar">
      <div class="profile-header">
        <div class="user-profile" id="currentUserProfile">
          <img class="avatar" id="myAvatar" src="https://via.placeholder.com/44" alt="avatar">
          <span id="myName">Loading...</span>
          <span class="status-dot"></span>
        </div>
        <button class="logout-btn" id="logoutBtn"><i class="fas fa-sign-out-alt"></i></button>
      </div>
      <!-- list of users (all except me) -->
      <div class="user-list" id="userList"></div>
    </aside>

    <!-- RIGHT CHAT PANEL -->
    <main class="chat-panel">
      <div class="chat-header" id="chatHeaderPlaceholder">
        <img class="avatar-medium" id="chatPartnerAvatar" src="https://via.placeholder.com/48" alt="">
        <div class="chat-header-info">
          <h3 id="chatPartnerName">Select a user</h3>
          <div id="typingIndicator" class="typing-indicator"></div>
        </div>
      </div>

      <!-- messages container -->
      <div class="messages-area" id="messagesArea"></div>

      <!-- message composer (disabled if no user selected) -->
      <div class="message-composer">
        <label class="attach-btn">
          <i class="fas fa-paperclip"></i>
          <input type="file" id="imageUpload" accept="image/*">
        </label>
        <input type="text" class="composer-input" id="messageInput" placeholder="Type a message" autocomplete="off">
        <button class="send-btn" id="sendMessageBtn"><i class="fas fa-paper-plane"></i></button>
      </div>
    </main>
  </div>
</div>

<script type="module">
  // ---------- FIREBASE IMPORTS (modular v10) ----------
  import { initializeApp } from '@firebase/app';
  import { 
    getAuth, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged 
  } from '@firebase/auth';
  import {
    getFirestore, doc, setDoc, getDoc, collection, query, where,
    onSnapshot, addDoc, serverTimestamp, updateDoc, orderBy, limit, getDocs
  } from '@firebase/firestore';
  import {
    getStorage, ref, uploadBytes, getDownloadURL
  } from '@firebase/storage';

  // ---------- CONFIG ----------
  const firebaseConfig = {
    apiKey: "AIzaSyCCloNQDHI8-fm7Z-5aDUZxH7DfPp-q8-0",
    authDomain: "globalchatapp-d5b72.firebaseapp.com",
    projectId: "globalchatapp-d5b72",
    storageBucket: "globalchatapp-d5b72.firebasestorage.app",
    messagingSenderId: "14224642973",
    appId: "1:14224642973:web:6aafc3f1082c4dd8af1574"
  };

  // init Firebase
  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);
  const storage = getStorage(app);
  const provider = new GoogleAuthProvider();

  // ---------- DOM elements ----------
  const loginOverlay = document.getElementById('login-overlay');
  const chatView = document.getElementById('chat-view');
  const googleLoginBtn = document.getElementById('googleLoginBtn');
  const logoutBtn = document.getElementById('logoutBtn');
  const myAvatar = document.getElementById('myAvatar');
  const myName = document.getElementById('myName');
  const userListDiv = document.getElementById('userList');
  const messagesArea = document.getElementById('messagesArea');
  const messageInput = document.getElementById('messageInput');
  const sendBtn = document.getElementById('sendMessageBtn');
  const imageUpload = document.getElementById('imageUpload');
  const chatPartnerName = document.getElementById('chatPartnerName');
  const chatPartnerAvatar = document.getElementById('chatPartnerAvatar');
  const typingIndicator = document.getElementById('typingIndicator');

  // ---------- state ----------
  let currentUser = null;                // Firebase user
  let selectedUserId = null;             // uid of the person we chat with
  let users = {};                        // map uid -> userData (name, avatar, online)
  let unsubscribeMessages = null;        // to detach listener
  let unsubscribeTyping = null;          
  let typingTimeout = null;

  // ---------- helper: update online status in firestore ----------
  async function setOnlineStatus(uid, status) {
    if (!uid) return;
    try {
      const userRef = doc(db, 'users', uid);
      await updateDoc(userRef, { online: status });
    } catch (e) {
      // if user doc missing? but we create on login
    }
  }

  // ---------- store user profile on first login ----------
  async function createOrUpdateUserProfile(user) {
    const userRef = doc(db, 'users', user.uid);
    const snap = await getDoc(userRef);
    const userData = {
      uid: user.uid,
      name: user.displayName || 'Anonymous',
      email: user.email,
      photoURL: user.photoURL || 'https://via.placeholder.com/100',
      online: true,
      lastSeen: serverTimestamp()
    };
    if (!snap.exists()) {
      await setDoc(userRef, userData);
    } else {
      await updateDoc(userRef, { online: true, lastSeen: serverTimestamp() });
    }
    return userData;
  }

  // ---------- load all users (except me) and listen to changes ----------
  function subscribeUsers() {
    const q = query(collection(db, 'users'));
    return onSnapshot(q, (snapshot) => {
      snapshot.docChanges().forEach((change) => {
        const data = change.doc.data();
        users[data.uid] = data;
      });
      // also ensure we have all in map
      snapshot.docs.forEach(d => { users[d.id] = d.data(); });
      renderUserList();
    });
  }

  // ---------- render left sidebar user list ----------
  function renderUserList() {
    if (!currentUser) return;
    const otherUsers = Object.values(users).filter(u => u.uid !== currentUser.uid);
    let html = '';
    otherUsers.forEach(u => {
      const isSelected = (selectedUserId === u.uid) ? 'selected' : '';
      html += `
        <div class="user-item ${isSelected}" data-uid="${u.uid}">
          <img class="avatar-small" src="${u.photoURL || 'https://via.placeholder.com/42'}" alt="avatar">
          <div class="user-info">
            <div class="user-name">
              ${u.name || 'No name'}
              ${u.online ? '<span class="online-badge">online</span>' : ''}
            </div>
            <div class="user-email">${u.email || ''}</div>
          </div>
        </div>
      `;
    });
    userListDiv.innerHTML = html;
    // attach click listeners to each user-item
    document.querySelectorAll('.user-item').forEach(el => {
      el.addEventListener('click', () => {
        const uid = el.dataset.uid;
        selectUser(uid);
      });
    });
  }

  // ---------- select user: load messages, setup listeners ----------
  async function selectUser(uid) {
    if (!currentUser || !uid) return;
    selectedUserId = uid;
    // update UI: remove selected class
    document.querySelectorAll('.user-item').forEach(el => el.classList.remove('selected'));
    document.querySelector(`.user-item[data-uid="${uid}"]`)?.classList.add('selected');
    
    // show header info
    const partner = users[uid];
    if (partner) {
      chatPartnerName.innerText = partner.name || 'User';
      chatPartnerAvatar.src = partner.photoURL || 'https://via.placeholder.com/48';
    }

    // detach old message listener
    if (unsubscribeMessages) unsubscribeMessages();
    if (unsubscribeTyping) unsubscribeTyping();

    // typing indicator listener: check if partner is typing to me
    const typingDocRef = doc(db, 'typing', `${currentUser.uid}_${uid}`);
    unsubscribeTyping = onSnapshot(typingDocRef, (snap) => {
      if (snap.exists() && snap.data().isTyping) {
        typingIndicator.innerText = 'typing...';
      } else {
        typingIndicator.innerText = '';
      }
    });

    // messages listener (real-time)
    const messagesQuery = query(
      collection(db, 'messages'),
      where('participants', 'array-contains', currentUser.uid),
      orderBy('timestamp', 'asc')
    );
    unsubscribeMessages = onSnapshot(messagesQuery, (snapshot) => {
      const msgs = [];
      snapshot.forEach(doc => {
        const data = doc.data();
        // only messages between these two users
        if (data.sender === currentUser.uid && data.receiver === uid ||
            data.sender === uid && data.receiver === currentUser.uid) {
          msgs.push({ id: doc.id, ...data });
        }
      });
      renderMessages(msgs);
    });
  }

  // ---------- render message bubbles ----------
  function renderMessages(messages) {
    if (!currentUser) return;
    let html = '';
    messages.forEach(msg => {
      const isMe = msg.sender === currentUser.uid;
      const time = msg.timestamp?.toDate().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }) || '...';
      if (msg.type === 'image') {
        html += `
          <div class="message-row ${isMe ? 'me' : 'other'}">
            <div class="message-bubble">
              <img src="${msg.imageUrl}" class="message-image" onclick="window.open(this.src)" />
              <div class="message-meta"><span>${time}</span></div>
            </div>
          </div>
        `;
      } else {
        html += `
          <div class="message-row ${isMe ? 'me' : 'other'}">
            <div class="message-bubble">
              ${msg.text || ''}
              <div class="message-meta"><span>${time}</span></div>
            </div>
          </div>
        `;
      }
    });
    messagesArea.innerHTML = html;
    messagesArea.scrollTop = messagesArea.scrollHeight;
  }

  // ---------- send text message ----------
  async function sendTextMessage() {
    const text = messageInput.value.trim();
    if (!text || !currentUser || !selectedUserId) return;
    messageInput.value = '';
    try {
      await addDoc(collection(db, 'messages'), {
        sender: currentUser.uid,
        receiver: selectedUserId,
        participants: [currentUser.uid, selectedUserId],
        text: text,
        type: 'text',
        timestamp: serverTimestamp()
      });
    } catch (e) { console.warn(e); }
  }

  // ---------- send image message ----------
  async function sendImageMessage(file) {
    if (!file || !currentUser || !selectedUserId) return;
    const filePath = `chat_images/${currentUser.uid}_${Date.now()}_${file.name}`;
    const storageRef = ref(storage, filePath);
    try {
      await uploadBytes(storageRef, file);
      const downloadURL = await getDownloadURL(storageRef);
      await addDoc(collection(db, 'messages'), {
        sender: currentUser.uid,
        receiver: selectedUserId,
        participants: [currentUser.uid, selectedUserId],
        imageUrl: downloadURL,
        type: 'image',
        timestamp: serverTimestamp()
      });
    } catch (e) { console.warn(e); }
  }

  // ---------- typing indicator handling ----------
  async function setTyping(typing) {
    if (!currentUser || !selectedUserId) return;
    const typingId = `${currentUser.uid}_${selectedUserId}`;
    const typingRef = doc(db, 'typing', typingId);
    await setDoc(typingRef, { isTyping: typing }, { merge: true });
    // auto clear after 2 sec if true
    if (typing) {
      if (typingTimeout) clearTimeout(typingTimeout);
      typingTimeout = setTimeout(() => setTyping(false), 2500);
    }
  }

  // ---------- auth observer ----------
  onAuthStateChanged(auth, async (user) => {
    if (user) {
      // user logged in
      currentUser = user;
      await createOrUpdateUserProfile(user);
      myAvatar.src = user.photoURL || 'https://via.placeholder.com/44';
      myName.innerText = user.displayName || 'Me';
      loginOverlay.style.display = 'none';
      chatView.style.opacity = '1';
      
      // start listening to users
      subscribeUsers();

      // when window unload, set offline
      window.addEventListener('beforeunload', () => setOnlineStatus(user.uid, false));
      // also set online again on load
      setOnlineStatus(user.uid, true);
    } else {
      // logged out
      if (currentUser) setOnlineStatus(currentUser.uid, false);
      currentUser = null;
      loginOverlay.style.display = 'flex';
      chatView.style.opacity = '0';
      if (unsubscribeMessages) unsubscribeMessages();
      if (unsubscribeTyping) unsubscribeTyping();
      userListDiv.innerHTML = '';
      messagesArea.innerHTML = '';
      chatPartnerName.innerText = 'Select a user';
      chatPartnerAvatar.src = 'https://via.placeholder.com/48';
    }
  });

  // ---------- login / logout events ----------
  googleLoginBtn.addEventListener('click', () => {
    signInWithPopup(auth, provider).catch(e => alert(e.message));
  });
  logoutBtn.addEventListener('click', () => {
    if (currentUser) setOnlineStatus(currentUser.uid, false);
    signOut(auth);
  });

  // ---------- send message button + enter key ----------
  sendBtn.addEventListener('click', sendTextMessage);
  messageInput.addEventListener('keypress', (e) => {
    if (e.key === 'Enter') sendTextMessage();
  });
  // typing indicator
  messageInput.addEventListener('input', () => {
    setTyping(true);
  });

  // ---------- image upload ----------
  imageUpload.addEventListener('change', (e) => {
    const file = e.target.files[0];
    if (file) sendImageMessage(file);
    imageUpload.value = ''; // allow re-select
  });

  // ---------- small fix: select user after render ----------
  window.selectUser = selectUser; // for debugging but not needed

  // initial render empty
</script>
</body>
</html>
